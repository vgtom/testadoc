version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: wasp_minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # MinIO Web UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog
    container_name: wasp_mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # MailHog Web UI

volumes:
  minio_data:
